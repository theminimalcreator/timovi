<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PRD — {{FEATURE_NAME}}</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #c9d1d9;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --accent-dim: #1f6feb;
      --green: #3fb950;
      --orange: #d2991d;
      --red: #f85149;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* Header */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 24px 32px;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .feature-name {
      font-size: 28px;
      font-weight: 700;
      color: #fff;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
    }

    .badge-status {
      background: rgba(63, 185, 80, 0.15);
      color: var(--green);
    }

    .badge-phase {
      background: rgba(88, 166, 255, 0.15);
      color: var(--accent);
    }

    .header-meta {
      margin-top: 12px;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      font-size: 13px;
      color: var(--text-muted);
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      padding: 0 32px;
    }

    .tab {
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      border: none;
      background: none;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
      font-family: var(--font);
    }

    .tab:hover { color: var(--text); }
    .tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .tab-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--border);
      color: var(--text-muted);
      font-size: 11px;
      min-width: 20px;
      height: 20px;
      border-radius: 10px;
      margin-left: 6px;
      padding: 0 6px;
    }

    /* Content */
    .content {
      max-width: 900px;
      margin: 0 auto;
      padding: 32px;
    }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* PRD Sections */
    .section { margin-bottom: 40px; }
    .section-title {
      font-size: 20px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .section h3 {
      font-size: 16px;
      font-weight: 600;
      color: var(--accent);
      margin: 20px 0 10px;
    }

    .section h3:first-child { margin-top: 0; }

    .section p { margin-bottom: 12px; color: var(--text); }

    /* Tables */
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0;
      font-size: 14px;
    }

    th, td {
      text-align: left;
      padding: 10px 14px;
      border: 1px solid var(--border);
    }

    th {
      background: var(--surface);
      font-weight: 600;
      color: var(--text);
      font-size: 13px;
    }

    td { color: var(--text); }

    /* Code blocks */
    code {
      background: var(--surface);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 13px;
      color: var(--orange);
      border: 1px solid var(--border);
    }

    pre {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 16px;
      overflow-x: auto;
      margin: 12px 0;
    }

    pre code {
      background: none;
      border: none;
      padding: 0;
      color: var(--text);
    }

    /* Lists */
    ul, ol { margin: 8px 0 16px 24px; }
    li { margin-bottom: 6px; }

    /* Issue cards */
    .issue-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .issue-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .issue-id {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
    }

    .issue-title {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
    }

    .issue-meta {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      font-size: 12px;
      color: var(--text-muted);
    }

    .issue-meta span {
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }

    .status-done { background: var(--green); }
    .status-progress { background: var(--accent); }
    .status-pending { background: var(--text-muted); }
    .status-blocked { background: var(--red); }
    .status-failed { background: var(--red); }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .empty-state-icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state-text { font-size: 15px; }

    /* Risks */
    .risk-high { color: var(--red); }
    .risk-medium { color: var(--orange); }
    .risk-low { color: var(--green); }

    /* Responsive */
    @media (max-width: 640px) {
      .header, .tabs, .content { padding-left: 16px; padding-right: 16px; }
      .feature-name { font-size: 22px; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-top">
      <h1 class="feature-name">{{FEATURE_NAME}}</h1>
      <div style="display:flex;gap:8px;">
        <span class="badge badge-status">{{FEATURE_STATUS}}</span>
        <span class="badge badge-phase">{{FEATURE_PHASE}}</span>
      </div>
    </div>
    <div class="header-meta">
      <span>📅 Created: {{CREATED_AT}}</span>
      <span>🔄 Updated: {{UPDATED_AT}}</span>
      <span>👤 PM: {{PM_NAME}}</span>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('docs')">
      📄 Documentação
    </button>
    <button class="tab" onclick="switchTab('issues')">
      🎫 Issues <span class="tab-badge" id="issue-count">{{ISSUE_COUNT}}</span>
    </button>
  </div>

  <!-- Content -->
  <div class="content">

    <!-- Tab: Documentação -->
    <div id="tab-docs" class="tab-content active">
      {{PRD_CONTENT}}
    </div>

    <!-- Tab: Issues -->
    <div id="tab-issues" class="tab-content">
      <div id="issues-container">
        <div class="empty-state">
          <div class="empty-state-icon">🎫</div>
          <div class="empty-state-text">
            Issues serão geradas na fase de <strong>Breakdown</strong>.<br>
            <span style="font-size:13px;">Volte aqui depois que o Tech Lead decompor o PRD.</span>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script>
    function switchTab(tabName) {
      // Update tab buttons
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelector(`.tab:nth-child(${tabName === 'docs' ? '1' : '2'})`).classList.add('active');

      // Update content
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      document.getElementById(`tab-${tabName}`).classList.add('active');
    }

{{ISSUES_INLINE_DATA}}

    // If no issues embedded, show empty state (placeholder already in HTML)
  </script>

</body>
</html>
