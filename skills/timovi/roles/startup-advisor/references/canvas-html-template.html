<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{CANVAS_TYPE}} — Timovi</title>
<style>
  :root {
    --bg: #0f1117;
    --bg-card: #161822;
    --border: #2a2d3a;
    --text: #e1e4ed;
    --text-muted: #6b7084;
    --accent: #7c8aff;
    --accent-dim: #5a65c9;
    --missing: #4a3040;
    --missing-text: #9b6b7a;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    padding: 2rem;
    max-width: 1100px;
    margin: 0 auto;
  }

  header {
    margin-bottom: 2rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--border);
  }

  header h1 {
    font-size: 1.75rem;
    font-weight: 700;
    color: var(--accent);
  }

  header .meta {
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-top: 0.25rem;
  }

  /* --- Canvas table --- */
  .canvas-table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 2rem;
    font-size: 0.85rem;
  }

  .canvas-table th,
  .canvas-table td {
    border: 1px solid var(--border);
    padding: 0.75rem 0.85rem;
    vertical-align: top;
    text-align: left;
  }

  .canvas-header {
    background: var(--bg-card);
    color: var(--accent);
    font-weight: 600;
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    white-space: nowrap;
  }

  .canvas-cell {
    background: var(--bg);
    min-width: 120px;
  }

  .canvas-label {
    font-weight: 700;
    display: block;
    margin-bottom: 0.3rem;
    color: var(--text);
  }

  .canvas-missing {
    color: var(--missing-text);
    background: var(--missing);
    border-radius: 3px;
    padding: 0.15rem 0.4rem;
    font-style: italic;
    font-size: 0.78rem;
  }

  /* --- Changelog --- */
  .changelog {
    margin-top: 2rem;
    border-top: 1px solid var(--border);
    padding-top: 1.5rem;
  }

  .changelog summary {
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--text-muted);
    cursor: pointer;
    user-select: none;
  }

  .changelog summary:hover { color: var(--text); }

  .changelog ul {
    list-style: none;
    margin-top: 0.75rem;
  }

  .changelog li {
    padding: 0.5rem 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.8rem;
  }

  .changelog li:last-child { border-bottom: none; }

  .changelog .cl-date {
    color: var(--accent-dim);
    font-weight: 600;
    margin-right: 0.5rem;
    white-space: nowrap;
  }

  .changelog .cl-diff {
    color: var(--text-muted);
  }

  /* --- Print --- */
  @media print {
    body { background: #fff; color: #111; padding: 1rem; }
    :root {
      --bg: #fff;
      --bg-card: #f5f5f5;
      --border: #ccc;
      --text: #111;
      --text-muted: #555;
      --accent: #333;
      --missing: #f9f0f0;
      --missing-text: #933;
    }
    .changelog { border-top-color: #ccc; }
  }
</style>
</head>
<body>

<header>
  <h1>{{CANVAS_TYPE}}</h1>
  <p class="meta">Generated: {{GENERATED_AT}} &middot; Timovi Startup Advisor</p>
</header>

{{CANVAS_CONTENT}}

<section class="changelog">
  <details open>
    <summary>Changelog</summary>
    <ul>
      {{CHANGELOG_ENTRIES}}
    </ul>
  </details>
</section>

</body>
</html>
